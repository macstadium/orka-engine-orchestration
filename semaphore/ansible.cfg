[defaults]
host_key_checking = False
forks = 20
bin_ansible_callbacks = True
stdout_callback = debug
callbacks_enabled = profile_tasks
gathering = smart
fact_caching = yaml
fact_caching_connection = /home/semaphore/.cache/ansible_facts
fact_caching_timeout = 60
default_become_user = root

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o UserKnownHostsFile=/dev/null -o PubkeyAuthentication=no
retries=10
