---
- name: Check capacity and prepare for deployment
  hosts: hosts
  gather_facts: false
  tags: plan
  roles:
    - gather_host_facts

- name: Create deployment plan
  hosts: localhost
  gather_facts: false
  tags: plan
  tasks:
    - name: Analyze VMs
      analyze_vm_groups:
        hosts_data: "{{ gather_host_facts_all_hosts_data }}"
        vm_name: "{{ vm_name }}"
      register: group_result

    - name: Display VM information
      ansible.builtin.debug:
        msg: >
          VM '{{ group_result.vm_name }}':
          {{ group_result.total_vms }} already deployed,
          {{ group_result.vms_to_deploy }} more needed

    - name: Create deployment plan
      plan_deployment:
        hosts_capacity: "{{ gather_host_facts_all_hosts_data }}"
        total_vms_to_deploy: "{{ group_result.vms_to_deploy }}"
      register: deployment_result

    - name: Display deployment plan summary
      ansible.builtin.debug:
        msg: >
          Deployment plan created for {{ deployment_result.total_vms }} VMs across
          {{ deployment_result.hosts_count }} hosts.
          Total capacity: {{ deployment_result.total_capacity }} VMs.

    - name: Display detailed deployment plan
      ansible.builtin.debug:
        var: deployment_result.deployment_plan

    - name: Share deployment plan with other hosts
      ansible.builtin.set_fact:
        deployment_plan: "{{ deployment_result.deployment_plan }}"

- name: Deploy VMs according to plan
  hosts: hosts
  gather_facts: false
  tasks:
    - name: Skip hosts without VMs to deploy
      ansible.builtin.meta: end_host
      when: inventory_hostname not in hostvars['localhost'].deployment_plan

    - name: Set VMs to deploy for this host
      ansible.builtin.set_fact:
        vms_to_deploy: "{{ hostvars['localhost']['deployment_plan'][inventory_hostname] | int }}"

    - name: Pull image using OCI credentials
      orka_image_pull:
        remote_name: "{{ vm_image }}"
        username: "{{ oci_username | default(omit) }}"
        password: "{{ oci_password | default(omit) }}"
        binary_path: "{{ engine_binary }}"
      when: not (public_image | default('true') | bool)

    - name: Deploy VMs on this host
      orka_vm_run:
        name: "{{ vm_name }}"
        binary_path: "{{ engine_binary }}"
        image: "{{ vm_image }}"
        cpu: "{{ cpu | default(2) }}"
        memory: "{{ memory | default(4096) }}"
        network_interface: "{{ network_interface | default(omit) }}"
      loop: "{{ range(1, vms_to_deploy | int + 1) | list }}"
      register: deploy_results

    - name: Collect deployed VM names
      ansible.builtin.set_fact:
        deployed_vm_names: "{{ deploy_results.results | map(attribute='name') | list }}"

    - name: Wait for all VMs to have IPs assigned
      orka_vm_list:
        binary_path: "{{ engine_binary }}"
      register: vm_list_result
      until: vm_list_result.vms | selectattr('ip', 'defined') | selectattr('ip', 'ne', '') | list | length == vm_list_result.vms | length
      retries: 24
      delay: 5

    - name: Update capacity facts after deployment
      ansible.builtin.set_fact:
        gather_host_facts_host_vms: "{{ vm_list_result.vms | list }}"
        cacheable: true

    - name: Display deployed VMs
      ansible.builtin.debug:
        msg: >-
          {{ item.name }} |
          {{ item.ip }} |
          {{ item.state }} |
          CPU: {{ item.cpu }} |
          Mem: {{ item.memory }}
      loop: "{{ vm_list_result.vms | selectattr('name', 'in', deployed_vm_names) | list }}"
      loop_control:
        label: "{{ item.name }}"
