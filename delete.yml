---
- name: Gather VM data from all hosts
  hosts: hosts
  gather_facts: false
  tags: plan
  roles:
    - gather_host_facts

- name: Create deletion plan
  hosts: localhost
  gather_facts: false
  tags: plan
  tasks:
    - name: Select VM for deletion
      plan_deletion:
        hosts_data: "{{ gather_host_facts_all_hosts_data }}"
        vm_name: "{{ vm_name }}"
      register: deletion_result

    - name: Display deletion plan summary
      ansible.builtin.debug:
        msg: >
          Deletion plan created for VM '{{ deletion_result.vm_name }}'.

    - name: Display detailed deletion plan
      ansible.builtin.debug:
        var: deletion_result.deletion_plan

    - name: Share deletion plan with other hosts
      ansible.builtin.set_fact:
        deletion_plan: "{{ deletion_result.deletion_plan }}"

- name: Delete VMs according to plan
  hosts: hosts
  gather_facts: false
  tasks:
    - name: Skip hosts without VMs to delete
      ansible.builtin.meta: end_host
      when: inventory_hostname not in hostvars['localhost'].deletion_plan

    - name: Set VMs to delete for this host
      ansible.builtin.set_fact:
        vms_to_delete: "{{ hostvars['localhost'].deletion_plan[inventory_hostname] }}"

    - name: Display VMs to be deleted
      ansible.builtin.debug:
        msg: "Deleting {{ vms_to_delete | length }} VMs from host {{ inventory_hostname }}: {{ vms_to_delete | join(', ') }}"

    - name: Delete VMs on this host
      orka_vm:
        name: "{{ item }}"
        state: absent
        binary_path: "{{ engine_binary }}"
      loop: "{{ vms_to_delete }}"
      register: delete_results

    - name: Check for deletion failures
      ansible.builtin.fail:
        msg: "Failed to delete one or more VMs. Please check the logs."
      when: delete_results.failed is defined and delete_results.failed

    - name: Get list of running VMs after deletion
      orka_vm_list:
        binary_path: "{{ engine_binary }}"
      register: vm_list_result

    - name: Update capacity facts after deletion
      ansible.builtin.set_fact:
        gather_host_facts_host_vms: "{{ vm_list_result.vms | list }}"
        cacheable: true
