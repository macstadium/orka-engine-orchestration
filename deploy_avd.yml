---
- name: Gather VM data from all hosts
  hosts: hosts
  gather_facts: false
  tags: plan
  roles:
    - gather_host_facts

- name: Plan AVD creation
  hosts: localhost
  gather_facts: false
  tags: plan
  tasks:
    - name: Find target host for VM
      plan_avd_create:
        hosts_data: "{{ gather_host_facts_all_hosts_data }}"
        vm_name: "{{ vm_name }}"
      register: avd_create_result

    - name: Determine next AVD name
      next_avd_name:
        vm_name: "{{ vm_name }}"
      delegate_to: "{{ avd_create_result.target_host }}"
      register: avd_name_result

    - name: Display AVD creation plan
      ansible.builtin.debug:
        msg: >
          AVD '{{ avd_name_result.avd_name }}' will be created on host
          '{{ avd_create_result.target_host }}' where VM '{{ avd_create_result.vm_name }}' is running.

    - name: Share plan with other hosts
      ansible.builtin.set_fact:
        avd_target_host: "{{ avd_create_result.target_host }}"
        avd_name: "{{ avd_name_result.avd_name }}"

- name: Create AVD on target host
  hosts: hosts
  gather_facts: false
  roles:
    - android_sdk_common
  tasks:
    - name: Skip hosts that are not the target
      ansible.builtin.meta: end_host
      when: inventory_hostname != hostvars['localhost'].avd_target_host

    - name: Create AVD
      ansible.builtin.include_role:
        name: create_avd
      vars:
        create_avd_name: "{{ hostvars['localhost'].avd_name }}"
        create_avd_platform: "{{ platform | default('android-36') }}"
        create_avd_image_type: "{{ image_type | default('google_apis') }}"
        create_avd_device_profile: "{{ device_profile | default('pixel_9') }}"

    - name: Run AVD
      avd:
        name: "{{ hostvars['localhost'].avd_name }}"
        cpu: "{{ cpu | default(omit) }}"
        memory: "{{ memory | default(omit) }}"
      register: avd_result
      when: run_avd | default(true) | bool

    - name: Display AVD creation summary
      ansible.builtin.debug:
        msg: >-
          {{
            [
              hostvars['localhost'].avd_name,
              'VM: ' ~ vm_name,
              'Host: ' ~ inventory_hostname,
              'Platform: ' ~ (platform | default('android-36')),
              'Image Type: ' ~ (image_type | default('google_apis')),
              'Device Profile: ' ~ (device_profile | default('pixel_9')),
              ('CPU: ' ~ cpu) if (run_avd | default(true) | bool and cpu is defined) else '',
              ('Memory: ' ~ memory) if (run_avd | default(true) | bool and memory is defined) else '',
              ('Relay IP: ' ~ avd_result['relay_ip']) if (run_avd | default(true) | bool) else '',
              ('Relay Port: ' ~ avd_result['relay_port']) if (run_avd | default(true) | bool) else '',
            ] | select | join(' | ')
          }}
  tags:
    - avdmanager
