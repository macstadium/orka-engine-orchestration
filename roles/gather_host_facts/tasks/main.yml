- name: Get list of running VMs on each host
  orka_vm_list:
    binary_path: "{{ gather_host_facts_engine_binary }}"
  register: vm_list_result

- name: Set capacity facts for each host
  set_fact:
    host_vms: "{{ vm_list_result.vms | list }}"
    cacheable: true

- name: Add host data for planning
  set_fact:
    host_data:
      hostname: "{{ inventory_hostname }}"
      vms: "{{ host_vms }}"
      max_vms_per_host: "{{ gather_host_facts_max_vms_per_host | int }}"

- name: Collect capacity data from all hosts
  set_fact:
    all_hosts_data: "{{ all_hosts_data | default([]) + [hostvars[item].host_data] }}"
  loop: "{{ ansible_play_hosts }}"
  run_once: true
  delegate_to: localhost
  delegate_facts: true
