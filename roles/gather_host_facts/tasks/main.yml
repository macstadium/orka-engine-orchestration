---
- name: Get list of running VMs on each host
  orka_vm_list:
    binary_path: "{{ gather_host_facts_engine_binary }}"
  register: gather_host_facts_vm_list_result

- name: Set capacity facts for each host
  ansible.builtin.set_fact:
    gather_host_facts_host_vms: "{{ gather_host_facts_vm_list_result.vms | list }}"
    cacheable: true

- name: Add host data for planning
  ansible.builtin.set_fact:
    gather_host_facts_host_data:
      hostname: "{{ inventory_hostname }}"
      vms: "{{ gather_host_facts_host_vms }}"
      max_vms_per_host: "{{ gather_host_facts_max_vms_per_host | int }}"

- name: Collect capacity data from all hosts
  ansible.builtin.set_fact:
    gather_host_facts_all_hosts_data: "{{ gather_host_facts_all_hosts_data | default([]) + [hostvars[item].gather_host_facts_host_data] }}"
  loop: "{{ ansible_play_hosts }}"
  run_once: true
  delegate_to: localhost
  delegate_facts: true
