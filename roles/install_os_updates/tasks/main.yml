---
- name: Set host to wait for
  ansible.builtin.set_fact:
    install_os_updates_host_to_wait_for: "{{ ansible_host | default(inventory_hostname) }}"

- name: Upgrade MacOS
  ansible.builtin.raw: echo '{{ ansible_become_password }}' |  softwareupdate --install --all --restart --stdinpass --user {{ ansible_user }} --agree-to-license
    --force
  register: install_os_updates_install_output
  changed_when: true
  become: true
  ignore_errors: true
  ignore_unreachable: true

- name: Wait for port 22 to become open and contain "OpenSSH"
  ansible.builtin.wait_for:
    port: 22
    host: "{{ install_os_updates_host_to_wait_for }}"
    timeout: 1800
    search_regex: OpenSSH
  delegate_to: "{{ install_os_updates_vm_host }}"
  become: false

- name: Display upgrade output
  ansible.builtin.debug:
    var: install_os_updates_install_output
