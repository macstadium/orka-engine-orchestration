- name: List all bash scripts
  find:
    paths: "{{ execute_scripts_scripts_directory }}"
    patterns: "*.sh"
  delegate_to: localhost
  register: bash_scripts

- name: Display found scripts
  debug:
    msg: "Found {{ bash_scripts.files | length }} bash scripts"
    
- name: Execute all scripts
  script: "{{ item.path }}"
  loop: "{{ bash_scripts.files }}"
  register: script_results
  loop_control:
    label: "{{ item.path | basename }}"
    
- name: Display script results
  debug:
    msg: "Script {{ item.item.path | basename }} result: {{ item.stdout }}"
  loop: "{{ script_results.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
