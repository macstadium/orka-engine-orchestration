---
- name: List all bash scripts
  ansible.builtin.find:
    paths: "{{ execute_scripts_scripts_directory }}"
    patterns: "*.sh"
  delegate_to: localhost
  register: execute_scripts_bash_scripts

- name: Display found scripts
  ansible.builtin.debug:
    msg: "Found {{ execute_scripts_bash_scripts.files | length }} bash scripts"

- name: Execute all scripts
  ansible.builtin.script: "{{ item.path }}"
  loop: "{{ execute_scripts_bash_scripts.files }}"
  register: execute_scripts_script_results
  loop_control:
    label: "{{ item.path | basename }}"

- name: Display script results
  ansible.builtin.debug:
    msg: "Script {{ item.item.path | basename }} result: {{ item.stdout }}"
  loop: "{{ execute_scripts_script_results.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
