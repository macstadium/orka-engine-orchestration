---
name: Build Semaphore Image

on:
  push:
    branches: [main]
    paths:
      - semaphore/precompiled/**
      - semaphore/assets/**
      - semaphore/overrides/**
  workflow_dispatch:
    inputs:
      semaphore_version:
        description: "Semaphore version tag (e.g. v2.17.36)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: macstadium/orka-engine-orchestration

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Semaphore version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.semaphore_version }}" ]; then
            echo "tag=${{ github.event.inputs.semaphore_version }}" >> "$GITHUB_OUTPUT"
          else
            tag=$(grep -oP 'SEMAPHORE_VERSION=\K\S+' semaphore/precompiled/Dockerfile)
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=semaphore-${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: semaphore
          file: semaphore/precompiled/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SEMAPHORE_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
