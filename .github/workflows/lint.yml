---
name: Lint

on:
  pull_request:
jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r orka-ansible-requirements.yml
      - name: Run ansible-lint
        uses: ansible/ansible-lint@v25
