---
- name: Validate environment setup
  hosts: hosts
  gather_facts: false
  vars:
    validate_platform: "{{ platform | default('android-36') }}"
    validate_image_types: "{{ (image_types | default('default,google_apis')).split(',') }}"
  tasks:
    # ── Engine ──
    - name: "Validate: orka-engine binary exists"
      ansible.builtin.stat:
        path: /usr/local/bin/orka-engine
      register: engine_binary
      failed_when: not engine_binary.stat.exists

    # Engine socket validation disabled — the become/sudo stat on the socket
    # crashes the engine on most Lab 10 nodes (known issue, under investigation).

    # ── Android SDK ──
    - name: "Validate: sdkmanager exists"
      ansible.builtin.stat:
        path: /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager
      register: sdkmanager
      failed_when: not sdkmanager.stat.exists

    - name: "Validate: Java installed"
      ansible.builtin.stat:
        path: /Library/Java/JavaVirtualMachines/temurin-21.jre/Contents/Home/bin/java
      register: java_bin
      failed_when: not java_bin.stat.exists

    - name: "Validate: run-avd script exists"
      ansible.builtin.stat:
        path: /opt/orka/bin/run-avd
      register: run_avd
      failed_when: not run_avd.stat.exists

    - name: "Validate: socat installed"
      ansible.builtin.stat:
        path: /opt/homebrew/bin/socat
      register: socat_bin
      failed_when: not socat_bin.stat.exists

    # ── SDK Components ──
    - name: "Validate: {{ validate_platform }} platform installed"
      ansible.builtin.stat:
        path: "/opt/android-sdk/platforms/{{ validate_platform }}"
      register: platform_check
      failed_when: not platform_check.stat.exists
      tags: sdk-components

    - name: "Validate: system image installed ({{ item }})"
      ansible.builtin.stat:
        path: "/opt/android-sdk/system-images/{{ validate_platform }}/{{ item }}/arm64-v8a"
      register: image_check
      failed_when: not image_check.stat.exists
      loop: "{{ validate_image_types }}"
      tags: sdk-components

    # ── Images ──
    - name: "Validate: OCI image pulled"
      ansible.builtin.command:
        cmd: "/usr/local/bin/orka-engine image list -o json"
      register: image_list
      changed_when: false
      failed_when: image_name | default('sequoia') not in image_list.stdout
      tags: images

    - name: "Validate: Summary"
      ansible.builtin.debug:
        msg: >-
          All checks passed on {{ inventory_hostname }}:
          engine={{ engine_binary.stat.exists }},
          sdkmanager={{ sdkmanager.stat.exists }},
          java={{ java_bin.stat.exists }},
          run-avd={{ run_avd.stat.exists }},
          socat={{ socat_bin.stat.exists }}
