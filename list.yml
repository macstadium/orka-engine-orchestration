- name: Gather VM data from all hosts
  hosts: hosts
  gather_facts: false
  roles:
    - gather_host_facts

- name: List VMs from group
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Analyze and display VM groups
      when: vm_group is defined
      block:
        - name: Analyze VM groups
          analyze_vm_groups:
            hosts_data: "{{ all_hosts_data }}"
            vm_group: "{{ vm_group }}"
            desired_vms: "2147483647" # maximum 32-bit integer
          register: group_analysis

        - name: Display detailed VM list
          debug:
            msg: |
              Count: {{ group_analysis.total_group_vms }}
              VMs in group '{{ vm_group }}':
              --------------------------------------------------
              {% for host_data in group_analysis.hosts_group_data %}
              {% if host_data.group_vms | length > 0 %}
              Host: {{ host_data.hostname }}
              VMs:
              {% for vm in host_data.group_vms %}
                - {{ vm.name }} | {{ vm.state }}
              {% endfor %}
              {% endif %}
              {% endfor %}

    - name: Display all host data
      debug:
        msg: |
          All VMs across hosts:
          --------------------------------------------------
          {% for host_data in all_hosts_data %}
          {% if host_data.vms | length > 0 %}
          Host: {{ host_data.hostname }}
          VMs:
          {% for vm in host_data.vms %}
            - {{ vm.name }} | {{ vm.state }} | {{ vm.ip }}
          {% endfor %}
          {% else %}
          Host: {{ host_data.hostname }} - No VMs
          {% endif %}
          --------------------------------------------------
          {% endfor %}
      when: vm_group is not defined
