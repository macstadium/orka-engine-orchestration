---
- name: Gather VM data from all hosts
  hosts: hosts
  gather_facts: false
  roles:
    - gather_host_facts

- name: List VMs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display VMs matching name prefix
      ansible.builtin.debug:
        msg: >-
          {{ vm_name }} |
          {{ item.1.name }} |
          {{ item.1.state }} |
          {{ item.1.ip }} |
          CPU: {{ item.1.cpu }} |
          Mem: {{ item.1.memory }} |
          Host: {{ item.0.hostname }}
      loop: >-
        {{ gather_host_facts_all_hosts_data | subelements('vms') }}
      loop_control:
        label: "{{ item.1.name }}"
      when:
        - vm_name is defined
        - item.1.name is match('^' ~ vm_name)

    - name: Display all VMs
      ansible.builtin.debug:
        msg: >-
          {{ item.1.name }} |
          {{ item.1.state }} |
          {{ item.1.ip }} |
          CPU: {{ item.1.cpu }} |
          Mem: {{ item.1.memory }} |
          Host: {{ item.0.hostname }}
      loop: >-
        {{ gather_host_facts_all_hosts_data | subelements('vms') }}
      loop_control:
        label: "{{ item.1.name }}"
      when: vm_name is not defined
