- name: Gather VM data from all hosts
  hosts: hosts
  gather_facts: false
  roles:
    - gather_host_facts

- name: List VMs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display VMs matching name prefix
      debug:
        msg: |
          VMs matching '{{ vm_name }}':
          --------------------------------------------------
          {% set ns = namespace(count=0) %}
          {% for host_data in all_hosts_data %}
          {% set matching = host_data.vms | selectattr('name', 'match', '^' ~ vm_name) | list %}
          {% if matching | length > 0 %}
          Host: {{ host_data.hostname }}
          VMs:
          {% for vm in matching %}
            - {{ vm.name }} | {{ vm.state }} | {{ vm.ip }} | CPU: {{ vm.cpu }} | Mem: {{ vm.memory }}
          {% set ns.count = ns.count + 1 %}
          {% endfor %}
          {% endif %}
          {% endfor %}
          --------------------------------------------------
          Count: {{ ns.count }}
      when: vm_name is defined

    - name: Display all host data
      debug:
        msg: |
          All VMs across hosts:
          --------------------------------------------------
          {% for host_data in all_hosts_data %}
          {% if host_data.vms | length > 0 %}
          Host: {{ host_data.hostname }}
          VMs:
          {% for vm in host_data.vms %}
            - {{ vm.name }} | {{ vm.state }} | {{ vm.ip }} | CPU: {{ vm.cpu }} | Mem: {{ vm.memory }}
          {% endfor %}
          {% else %}
          Host: {{ host_data.hostname }} - No VMs
          {% endif %}
          --------------------------------------------------
          {% endfor %}
      when: vm_name is not defined
