---
- name: Manage a single VM by name
  hosts: hosts
  gather_facts: false
  tasks:
    - name: Check if VM exists on this host
      orka_vm_list:
        binary_path: "{{ engine_binary }}"
      register: vm_list_result

    - name: Set VM existence fact
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_name in (vm_list_result.vms | map(attribute='name') | list) }}"

    - name: Manage VM if it exists
      when: vm_exists
      block:
        - name: Manage the specified VM if it exists
          orka_vm:
            name: "{{ vm_name }}"
            state: "{{ desired_state }}"
            binary_path: "{{ engine_binary }}"
            network_interface: "{{ network_interface | default(omit) }}"

        - name: Get updated list of running VMs
          orka_vm_list:
            binary_path: "{{ engine_binary }}"
          register: updated_vm_list

        - name: Update capacity facts after deletion
          ansible.builtin.set_fact:
            gather_host_facts_host_vms: "{{ updated_vm_list.vms | list }}"
            cacheable: true
