---
- name: Manage VMs by name or prefix
  hosts: hosts
  gather_facts: false
  tasks:
    - name: Get list of VMs on this host
      orka_vm_list:
        binary_path: "{{ engine_binary }}"
      register: vm_list_result

    - name: Find matching VMs
      ansible.builtin.set_fact:
        matching_vms: "{{ vm_list_result.vms | selectattr('name', 'match', '^' ~ vm_name) | list }}"

    - name: Manage matching VMs
      when: matching_vms | length > 0
      block:
        - name: Display matching VMs
          ansible.builtin.debug:
            msg: "Found {{ matching_vms | length }} VM(s) matching '{{ vm_name }}': {{ matching_vms | map(attribute='name') | join(', ') }}"

        - name: Manage each matching VM
          orka_vm:
            name: "{{ item.name }}"
            state: "{{ desired_state }}"
            binary_path: "{{ engine_binary }}"
            network_interface: "{{ network_interface | default(omit) }}"
          loop: "{{ matching_vms }}"
          loop_control:
            label: "{{ item.name }}"

        - name: Get updated list of running VMs
          orka_vm_list:
            binary_path: "{{ engine_binary }}"
          register: updated_vm_list

        - name: Update capacity facts
          ansible.builtin.set_fact:
            gather_host_facts_host_vms: "{{ updated_vm_list.vms | list }}"
            cacheable: true
